{% extends "base_layout.html" %}
{% block title %}Signup{% endblock title %}
{% block content %}
<div class="container mt-4">
    <h1>Signup</h1>
    <form class="form" action="{% url 'accounts:signup' %}" method="post">
        {% csrf_token %}
        {{ form }}
        <button type="submit">Sign up</button>
    </form>
</div>
{% endblock content %}
